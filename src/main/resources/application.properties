#========================基本配置
# 应用名称
spring.application.name=sharging-jdbc-springboot-demo
# 开发环境设置
spring.profiles.active=dev
# 单机模式（5.2+ 已移除 Memory，默认即为 Standalone，可省略此行）
spring.shardingsphere.mode.type=Standalone
# 打印SQl
spring.shardingsphere.props.sql-show=true

#========================数据源配置
# 配置真实数据源
spring.shardingsphere.datasource.names=ds0,ds1

# 配置第 1 个数据源
# spring.shardingsphere.datasource.<数据源名>.<数据源配置项>=配置值
spring.shardingsphere.datasource.ds0.type=com.zaxxer.hikari.HikariDataSource
spring.shardingsphere.datasource.ds0.driver-class-name=com.mysql.jdbc.Driver
spring.shardingsphere.datasource.ds0.jdbc-url=jdbc:mysql://47.106.155.227:3306/db_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.shardingsphere.datasource.ds0.username=root
spring.shardingsphere.datasource.ds0.password=wenbin123456

# 配置第 2 个数据源
spring.shardingsphere.datasource.ds1.type=com.zaxxer.hikari.HikariDataSource
spring.shardingsphere.datasource.ds1.driver-class-name=com.mysql.jdbc.Driver
spring.shardingsphere.datasource.ds1.jdbc-url=jdbc:mysql://1.15.233.144:3307/db_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.shardingsphere.datasource.ds1.username=root
spring.shardingsphere.datasource.ds1.password=123456

#========================标准分片表配置（数据节点配置）
# spring.shardingsphere.rules.sharding.tables.<table-name>.actual-data-nodes=值
# 值由数据源名 + 表名组成，以小数点分隔。多个表以逗号分隔，支持 inline 表达式。
# <table-name>：逻辑表名
spring.shardingsphere.rules.sharding.tables.t_order.actual-data-nodes=ds$->{0..1}.t_order$->{0..1}

#------------------------分库策略
# spring.shardingsphere.rules.sharding.tables.<table-name>.database-strategy.standard.sharding-column=列名称
# 分片列名称
spring.shardingsphere.rules.sharding.tables.t_order.database-strategy.standard.sharding-column=user_id
# 分片算法名称
# spring.shardingsphere.rules.sharding.tables.<table-name>.database-strategy.sharding-algorithm-name=算法名称
spring.shardingsphere.rules.sharding.tables.t_order.database-strategy.standard.sharding-algorithm-name=alg_inline_userid

#------------------------分表策略
# 分片列名称
# spring.shardingsphere.rules.sharding.tables.<table-name>.table-strategy.standard.sharding-column=列名称
spring.shardingsphere.rules.sharding.tables.t_order.table-strategy.standard.sharding-column=order_no
# 分片算法名称
# spring.shardingsphere.rules.sharding.tables.<table-name>.table-strategy.sharding-algorithm-name=算法名称
spring.shardingsphere.rules.sharding.tables.t_order.table-strategy.standard.sharding-algorithm-name=alg_hash_mod

#------------------------分片算法配置
# 行表达式分片算法
# 分片算法类型
# spring.shardingsphere.rules.sharding.sharding-algorithms.<sharding-algorithm-name>.type=算法类型
# <sharding-algorithm-name>：上面配置的自定义的算法名称
spring.shardingsphere.rules.sharding.sharding-algorithms.alg_inline_userid.type=INLINE
# 分片算法属性配置
# spring.shardingsphere.rules.sharding.sharding-algorithms.<sharding-algorithm-name>.props.<propName>=属性值
spring.shardingsphere.rules.sharding.sharding-algorithms.alg_inline_userid.props.algorithm-expression=ds$->{user_id % 2}

# 哈希取模分片算法
# 分片算法类型
spring.shardingsphere.rules.sharding.sharding-algorithms.alg_hash_mod.type=HASH_MOD
# 分片算法属性配置
spring.shardingsphere.rules.sharding.sharding-algorithms.alg_hash_mod.props.sharding-count=2

